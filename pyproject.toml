[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E501",   # line too long — long report strings are intentional
    "E402",   # module-level import not at top — needed for test path setup
    "UP017",  # datetime.UTC alias — fix requires Python >= 3.11 at runtime;
    "UP045",  # X | None syntax  — fix requires Python >= 3.10 at runtime;
    "B905",   # zip(strict=)     — kwarg requires Python >= 3.10 at runtime.
              # CI tests 3.11/3.12, but the engine stays importable on 3.9+
              # so the demo runs on stock macOS python3.
]
