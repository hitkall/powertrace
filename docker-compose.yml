version: "3.9"

networks:
  powertrace-network:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  tempo-data:

services:
  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: powertrace-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: powertrace
      GF_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - powertrace-network
    depends_on:
      - prometheus
      - tempo

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: powertrace-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - powertrace-network

  # ── Tempo ──────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: powertrace-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC (exposed so export_to_otel.py can reach it directly if needed)
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - tempo-data:/var/tempo
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
    networks:
      - powertrace-network

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: powertrace-otel-collector
    restart: unless-stopped
    ports:
      - "4318:4318"   # OTLP HTTP  ← export_to_otel.py sends here
      - "8889:8889"   # Prometheus exporter (scraped by Prometheus)
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    networks:
      - powertrace-network
    depends_on:
      - prometheus
      - tempo
